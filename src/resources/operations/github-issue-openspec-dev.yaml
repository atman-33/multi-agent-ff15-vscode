name: github-issue-openspec-dev
description: >
  GitHub issue driven OpenSpec delivery operation.
  Noctis creates change artifacts, Gladiolus implements with TDD, Ignis reviews, Prompto prepares manual verification docs, and Noctis closes out delivery after User verification.
initial_step: spec-planning

steps:
  - name: spec-planning
    agent: noctis
    instruction:
      inline: |
        # Issue-to-Spec Planning

        ## Role: Planner

        Convert User's request into a concrete plan that downstream agents can execute.

        Responsibilities:
        - Organize the goal, success conditions, constraints, and scope
        - Review related code and existing patterns to identify the impact surface
        - Ask User only about unresolved points that must be clarified before implementation
        - Stop at the plan and decision material; do not move into implementation

        Principles:
        1. **Plan Before Code**: Do not implement. Firm up the plan first.
        2. **Ask Only When Needed**: Ask specific questions only when missing information is a blocker.
        3. **Ground in Codebase**: Base the plan on actual investigation of the codebase.
        4. **Be Actionable**: Make the result concrete enough that the implementer can start immediately.

        Do not:
        - Start implementation, prototyping, or code changes
        - Fill gaps by guessing about unverified details
        - Add out-of-scope proposals on your own

        ## Instructions

        Before planning, read the openspec-propose skill at `{{ facet_skill("openspec-propose") }}` and follow it to produce coherent OpenSpec change artifacts in this step.

        1. If the execution workspace is a git repository and an `origin` remote exists, run `git fetch origin --prune` first to retrieve the latest remote history.
        2. When `origin/main` is available, inspect the latest code from there by moving to `origin/main` with `git switch --detach origin/main` before planning. When `origin/main` is not available, inspect the current local branch or `HEAD` instead and continue without blocking on the missing remote.
        3. Read the GitHub issue URL provided by User and organize the issue goal, acceptance criteria, and related links. If parent issue information is explicitly given, inspect that as well and integrate its scope and constraints.
        4. Before creating OpenSpec artifacts, decide on an appropriate kebab-case change name from the issue contents.
        5. Once the change name is decided, create and switch to the corresponding feature branch. Prefer branching from `origin/main` when it is available; otherwise branch from the current local branch or `HEAD`. Use `feature/<issue-number>-<change-name>` as the base form, and reuse an existing matching branch when appropriate.
        6. Create the OpenSpec change under `openspec/changes/<change-name>/` inside `openspec_root` from `<tooling-context>`. If the OpenSpec CLI is available, prefer `openspec new change "<change-name>"`, then inspect `openspec status --change "<change-name>" --json` to learn the artifact graph, `applyRequires`, and schema-specific requirements.
        7. When the OpenSpec CLI can provide artifact instructions, follow `openspec instructions <artifact-id> --change "<change-name>" --json` for each ready artifact, read dependency artifacts before writing the next one, apply the returned template and rules as constraints, and continue until every implementation-required artifact is complete. If the CLI is unavailable, create the equivalent scaffold manually and ensure at minimum that `.openspec.yaml`, `proposal.md`, `design.md`, `tasks.md`, and any required delta specs under `specs/` exist and are coherent.
        8. Before writing the design, apply a boundary-first architecture pass: identify the owning module for each behavior change, prefer deep modules over thin pass-through layers, capture the key interface and data-flow decisions, record tradeoffs and risks explicitly, and define the validation strategy that downstream implementation should follow.
        9. Write the generated OpenSpec artifacts in `{{ setting("language", "name") }}`.
        10. Even if frontend automation cannot be made sufficient, do not define a manual verification guide, checklist, or report as an OpenSpec deliverable or task. If needed, record only the coverage gap or verification scope there; the final manual verification document for this operation is created only in the later `manual-verification` step.
        11. Do not pin references or creation targets to the current workspace. Treat `openspec_root` from `<tooling-context>` as the project root and use the `openspec/` directory under it. Use `active_projects` from `<tooling-context>` as the configured target project set when the work spans multiple projects.
        12. After artifact creation, report the final `change_name` and `change_path` in `spec-plan.md`. Only if User explicitly asked to review or approve the artifacts before implementation, ask for confirmation and wait. Otherwise, proceed without waiting.
    output_contracts:
      report:
        - name: spec-plan.md
          format:
            file: ../facets/output-contracts/spec-plan.md
    rules:
      - condition: OpenSpec artifacts generated, and approval was obtained only if User explicitly requested artifact review before implementation
        next: implement
      - condition: Cannot proceed with planning safely
        next: planning-blocked

  - name: planning-blocked
    agent: noctis
    instruction:
      inline: |
        # Planning Blocked

        ## Role: Planner

        You were converting User's request into a concrete plan, but spec planning could not proceed safely.

        ## Instructions

        1. Explain clearly why spec planning could not proceed safely.
        2. Summarize the missing prerequisite, unresolved risk, or blocked dependency, and state the next action needed from User or the environment.
    rules:
      - condition: Blocker explained
        next: ABORT

  - name: implement
    agent: gladiolus
    instruction:
      inline: |
        # Implement With TDD

        ## Role: Implementer

        Implement robust, maintainable code that matches the given requirements and scope exactly.

        Expertise:
        - Production-ready implementation that follows established patterns
        - Type-safe code
        - Changes that include adding or updating tests
        - Implementation in small, incremental diffs
        - Implementations that surface invalid states early

        Principles:
        1. **Requirement-Driven**: Follow the given requirements and scope. Do not widen them on your own.
        2. **Fail Fast**: Validate inputs early and throw on invalid states. Do not fall back silently.
        3. **Reuse Before Rewrite**: Prefer reusing existing implementations and patterns before writing something new.
        4. **Smallest Necessary Change**: Limit the change to the minimum needed to achieve the goal.
        5. **Leave Production-Ready Code**: Do not leave TODO stubs, placeholder implementations, or commented-out code.

        Do not:
        - Add features or fixes outside the scope
        - Lean on `any` or other unsafe escapes casually
        - Swallow errors
        - Mix in unrelated refactors or file cleanup

        ## Instructions

        1. Read `{{ output("spec-planning", "latest", "spec-plan.md") }}` and use the frontmatter `change_name` as the OpenSpec change name. If `change_path` is present, use it first; otherwise use `openspec/changes/<change_name>/` under `openspec_root` from `<tooling-context>`. If `change_name` or `change_path` cannot be resolved, report the step as blocked.
        2. Announce which change you are using, then inspect its current status. If the OpenSpec CLI is available, prefer `openspec status --change "<change-name>" --json` and `openspec instructions apply --change "<change-name>" --json` so you can read the schema, progress, tasks, and every concrete context file path before coding.
        3. Read every context artifact that defines the change. At minimum, use the available proposal, specs, design, and tasks files. If the CLI provides `contextFiles`, treat that list as authoritative rather than assuming fixed file names.
        4. Before editing code, confirm that the public interface changes and the next behavior to prove are clear. If an essential interface or behavior remains ambiguous, pause and ask for clarification instead of guessing.
        5. Implement in thin vertical slices, not horizontal batches. Start from one observable behavior that can be verified through a public interface, add or update one focused failing test or equivalent executable check, make the minimum code change to pass it, then move to the next slice.
        6. Follow red-green-refactor strictly. Never refactor while RED. Keep tests behavior-oriented, prefer end-to-end or boundary-facing checks over implementation-coupled tests, and avoid speculative code for future tasks.
        7. After each completed slice, update the corresponding task entry immediately. If the tasks artifact uses checkboxes, change `- [ ]` to `- [x]` as soon as the slice is actually complete. If part of the change cannot be automated, record the exact coverage gap and keep the rest of the slice test-backed.
        8. Keep going until the implementation-required tasks are done or you hit a blocker. If the work reveals a design problem or artifact inconsistency, stop, explain the issue concretely, and recommend whether implementation or the change artifacts should be updated next.

        ## Policies: Coding Standards

        Quality criteria and judgment rules for implementation and review steps. These rules define what is acceptable (`APPROVE`) and what must be fixed (`REJECT`).

        REJECT Conditions (Blocking):

        | ID | Rule | REJECT When |
        |----|------|-------------|
        | CS-001 | Type Safety | `any` is used without justification, or type assertions are used without explanatory comments |
        | CS-002 | Error Handling | Errors are silently swallowed, there is an empty catch block, or error propagation is insufficient |
        | CS-003 | Test Coverage | There is no test covering a new code path |
        | CS-004 | Dead Code | Commented-out code remains, there are unused imports, or unreachable code exists |
        | CS-005 | Scope Creep | Changes outside the defined task scope are included without explicit justification |
        | CS-006 | Breaking Change | A public API contract is changed without a migration path |
        | CS-007 | Security | User input is not validated, there is risk of SQL or command injection, or secrets are hardcoded |
        | CS-008 | Incomplete Implementation | TODO or FIXME stubs remain on production paths, or placeholder return values are left in place |
        | CS-009 | Convention Violation | File naming, directory structure, or patterns deviate from project conventions |
        | CS-010 | Failing Tests | Existing tests are broken by the change, or new tests do not actually assert anything |

        APPROVE Conditions:

        | ID | Rule | APPROVE When |
        |----|------|--------------|
        | AP-001 | Spec Compliance | The implementation addresses every requirement in the spec |
        | AP-002 | Test Pass | All tests pass (existing and new) |
        | AP-003 | Type Check | There are no TypeScript errors |
        | AP-004 | Lint Clean | No new lint warnings are introduced |
        | AP-005 | Minimal Diff | The change is focused on the task and avoids unrelated fixes |

        Judgment Guidelines:
        - If there is even one REJECT finding, the overall verdict becomes `Needs Fix`
        - Multiple non-blocking findings still do not cause rejection
        - When judgment is borderline, use "would this cause a runtime failure?" as the standard. If not, treat it as non-blocking
        - Prefer concrete statements over abstract ones. For example, write `CS-003: handleSubmit() at form.tsx:42 has no test` instead of `Missing tests`
    rules:
      - condition: Implementation complete and relevant tests pass
        next: review
      - condition: Cannot proceed with implementation
        next: ABORT

  - name: review
    agent: ignis
    instruction:
      inline: |
        # Review Against Change Artifacts

        ## Role: Reviewer

        Evaluate code changes for correctness, design quality, and standards compliance, and clearly point out problems that must be fixed. Do not change code.

        Expertise:
        - Architecture and design review
        - Verifying code correctness
        - Detecting security vulnerabilities
        - Identifying performance concerns
        - Checking compliance with conventions and style

        Judgment Principles:
        1. **Intent-Aware Review**: Evaluate changes against the given requirements and scope.
        2. **Evidence-Based Findings**: Back important findings with concrete evidence.
        3. **Severity Discipline**: Treat only incorrect behavior, missing requirements, security issues, and broken tests as blocking.
        4. **Policy-Grounded Judgment**: When applicable, ground findings in policy or standards.
        5. **Approve When Sufficient**: Approve when requirements are met and no blocking issues remain.

        Finding Classification:

        | Severity | Criteria | Action |
        |----------|----------|--------|
        | **Blocking** | Incorrect behavior, missing requirements, security vulnerability, broken tests | Must be fixed before approval |
        | **Non-Blocking** | Style issues, minor naming issues, missing documentation, optional improvement | Record for later without blocking approval |

        Do not:
        - Edit or change code
        - Raise blocking issues without evidence
        - Treat subjective preference as a blocking issue
        - Demand rewrites outside the scope of the current task
        - Block approval because of non-blocking issues

        ## Instructions

        1. Do not modify code. Review the implementation against the change artifacts directly.
        2. Read `{{ output("spec-planning", "latest", "spec-plan.md") }}` and resolve `change_name` and `change_path` as the verification target. If `change_path` is absent, use `openspec/changes/<change_name>/` under `openspec_root` from `<tooling-context>`. If the change cannot be resolved safely, report the step as blocked.
        3. Load the available proposal, specs, design, tasks, and implementation diff. If the OpenSpec CLI is available, prefer its status or apply instructions to discover the schema and concrete context files. Otherwise inspect the change directory directly.
        4. Structure the review across three dimensions. `Completeness`: unfinished tasks, missing requirements, or missing artifact coverage. `Correctness`: implementation and tests that diverge from the intended requirement or scenario behavior. `Coherence`: design decisions not followed, inconsistent patterns, or integration risks introduced by the implementation.
        5. Treat incorrect behavior, missing requirements, broken tests, or unsafe design mismatches as blocking. When uncertain, prefer a lower-severity finding instead of overstating the problem.
        6. When delta specs exist, inspect each requirement and scenario and map them to implementation evidence. Call out gaps explicitly. When tasks exist, inspect every incomplete checkbox and treat it as a blocking completeness issue unless the implementation clearly proves the task is already done.
        7. Write the report using the `code-review` output contract in `{{ setting("language", "name") }}`. Every blocking finding must include concrete evidence and a precise location in `file:line` form where possible. Non-blocking findings may recommend follow-up without changing the verdict.

        ## Policies: Coding Standards

        Quality criteria and judgment rules for implementation and review steps. These rules define what is acceptable (`APPROVE`) and what must be fixed (`REJECT`).

        REJECT Conditions (Blocking):

        | ID | Rule | REJECT When |
        |----|------|-------------|
        | CS-001 | Type Safety | `any` is used without justification, or type assertions are used without explanatory comments |
        | CS-002 | Error Handling | Errors are silently swallowed, there is an empty catch block, or error propagation is insufficient |
        | CS-003 | Test Coverage | There is no test covering a new code path |
        | CS-004 | Dead Code | Commented-out code remains, there are unused imports, or unreachable code exists |
        | CS-005 | Scope Creep | Changes outside the defined task scope are included without explicit justification |
        | CS-006 | Breaking Change | A public API contract is changed without a migration path |
        | CS-007 | Security | User input is not validated, there is risk of SQL or command injection, or secrets are hardcoded |
        | CS-008 | Incomplete Implementation | TODO or FIXME stubs remain on production paths, or placeholder return values are left in place |
        | CS-009 | Convention Violation | File naming, directory structure, or patterns deviate from project conventions |
        | CS-010 | Failing Tests | Existing tests are broken by the change, or new tests do not actually assert anything |

        APPROVE Conditions:

        | ID | Rule | APPROVE When |
        |----|------|--------------|
        | AP-001 | Spec Compliance | The implementation addresses every requirement in the spec |
        | AP-002 | Test Pass | All tests pass (existing and new) |
        | AP-003 | Type Check | There are no TypeScript errors |
        | AP-004 | Lint Clean | No new lint warnings are introduced |
        | AP-005 | Minimal Diff | The change is focused on the task and avoids unrelated fixes |

        Judgment Guidelines:
        - If there is even one REJECT finding, the overall verdict becomes `Needs Fix`
        - Multiple non-blocking findings still do not cause rejection
        - When judgment is borderline, use "would this cause a runtime failure?" as the standard. If not, treat it as non-blocking
        - Prefer concrete statements over abstract ones. For example, write `CS-003: handleSubmit() at form.tsx:42 has no test` instead of `Missing tests`
    output_contracts:
      report:
        - name: code-review.md
          format:
            file: ../facets/output-contracts/code-review.md
    rules:
      - condition: Approved — no blocking issues
        next: manual-verification
      - condition: Blocking or critical issues found
        next: implement
      - condition: Review cannot proceed
        next: ABORT

  - name: manual-verification
    agent: prompto
    instruction:
      inline: |
        # Manual Verification Docs

        ## Role: Verification Writer

        For an implemented change, create a concrete manual verification guide that User can follow locally.

        Responsibilities:
        - Define the verification scope from the changed surface and impacted areas
        - Organize prerequisites, action steps, expected results, and note fields
        - Leave a checklist that User can follow from top to bottom
        - Write reproducible verification steps, not internal implementation explanations

        Principles:
        1. **User-Centric**: Write observable steps that User can execute.
        2. **Concrete Expected Results**: Attach specific expected results to each step.
        3. **Scope-Aware**: Prioritize happy paths and failure paths that matter to the diff.
        4. **Preserve Accuracy**: Clearly mark anything unverified as unverified.

        Do not:
        - Start changing code
        - Fill the guide only with internal implementation explanation
        - Write expected results that cannot be observed
        - Add verification items outside the scope on your own

        ## Instructions

        1. Create exactly one user-facing manual verification document at the mission-scoped output path defined by this step's output contract. Do not create duplicate copies in the app repository, execution workspace, or any reports directory.
        2. Determine the verification scope from the implementation diff, `{{ output("spec-planning", "latest", "spec-plan.md") }}`, and any remaining findings in `{{ output("review", "latest", "code-review.md") }}`.
        3. If a scaffold generator or helper exists in the target repository, you may use it. Otherwise write the document directly. In either case, the output contract is authoritative for the final structure.
        4. Document concrete prerequisites first: startup steps, required data, roles or permissions, environment conditions, observable logs or screens, and any configuration values needed to run the checks.
        5. For each checklist item, include all of the following: execution steps, expected result, observation point, and an `Evidence / notes` field. If the exact execution method is unknown, write `Maintainer input required:` and name the missing detail instead of inventing a partial procedure.
        6. Cover at least three verification angles: one happy path, one edge or failure path, and one permission, notification, background-job, side-effect, or equivalent operational check.
        7. Make every expected result observable and specific. Prefer runnable commands or exact navigation steps over vague instructions, especially for APIs, scripts, jobs, queues, notifications, or log-driven behavior.
        8. Write the document body in `{{ setting("language", "name") }}` and summarize the generated file path, target scope, main scenarios, and any remaining open items after creation.
    output_contracts:
      report:
        - name: manual-verification.md
          format:
            file: ../facets/output-contracts/manual-verification.md
    rules:
      - condition: Manual verification document created
        next: finalize-delivery
      - condition: Cannot create the document
        next: ABORT

  - name: finalize-delivery
    agent: noctis
    instruction:
      inline: |
        # Finalize Delivery

        ## Role: Noctis Autonomous Orchestrator

        While speaking directly with User, delegate small child tasks to workers when useful, integrate their results, and keep things moving forward.

        Responsibilities:
        - Take end-to-end responsibility for User's request
        - Advance what you can answer on your own
        - Delegate only the minimum necessary child tasks when delegation is useful
        - Do not relay worker results as-is; integrate them as Noctis's own judgment

        Principles:
        1. **Conversation First**: Keep direct conversation with User as the primary mode.
        2. **Delegate With Intent**: Create child tasks only when the objective is clear.
        3. **Own The Outcome**: Noctis is responsible for final judgment and the explanation to User.
        4. **Keep Context Local**: Pass only the context needed for each child task.

        Do not:
        - Cut off the conversation as if the parent step must be completed
        - Send workers vague or overly broad requests
        - Show User raw worker responses without integrating them

        ## Instructions

        1. Read `{{ output("spec-planning", "latest", "spec-plan.md") }}`, `{{ output("review", "latest", "code-review.md") }}`, and `{{ output("manual-verification", "latest", "manual-verification.md") }}`. Resolve `change_name` from the spec plan and prefer `change_path` if it is present. If neither can be resolved, report the step as blocked.
        2. Ask User to run the checks in `manual-verification.md` and confirm whether any problem was found. If User reports problems, summarize the symptoms, unverified items, and reproduction notes, and return to the implement step without archiving, committing, or creating a PR.
        3. If User reports no problems, archive the target change without asking User to choose it again. First assess delta spec sync state and sync approved delta specs into the main specs before archiving. Prefer repository helpers or OpenSpec CLI commands when available; otherwise perform the equivalent manual sync and record what changed.
        4. Before moving the change, check for incomplete tasks or incomplete artifacts. If they still exist, call them out explicitly and proceed only if the workflow can still justify completion safely. Archive into `openspec/changes/archive/YYYY-MM-DD-<change-name>/` or the equivalent archive location used by the active OpenSpec repository. If the target archive path already exists or the sync/archive result cannot be verified, stop as blocked.
        5. After archiving, inspect the git repository state available in the current execution mode. Do not assume a git worktree. Use whatever git information is available, including branch state, staged or unstaged diff, and conflict state, to decide whether the changes created or updated by this workflow can be identified safely. If there are merge conflicts, unrelated local changes, or the available git state is insufficient to identify the commit set safely, stop as blocked.
        6. If it is safe to commit, stage only the changes created or updated by this workflow and commit them using `feat: <change_name>` for `feature/` or `feat/` branches, `fix: <change_name>` for `fix/`, `bugfix/`, or `hotfix/` branches, `docs: <change_name>` for `docs/` branches, and `chore: <change_name>` otherwise. If there is nothing new to commit, keep the current `HEAD`. Then publish the current branch to the remote.
        7. Prepare a PR analysis and a complete PR body draft from the implementation diff, change artifacts, and manual verification result. The requested language `{{ setting("language", "name") }}` is binding for the final PR title and body. Save draft artifacts when the environment supports it, and run repository quality checks such as a helper script when available; otherwise perform equivalent sanity checks before submitting.
        8. This operation uses the explicit fast-path: do not wait for another approval turn. If an open PR already exists for the current branch, update it. Otherwise create a new PR from the current branch to the repository default branch. Use a body file or an equivalently lossless submission path so formatting, checklists, and issue references survive publication.
        9. After creating or updating the PR, inspect the published PR via `gh pr view --json` or an equivalent query and verify that the title and body are written in `{{ setting("language", "name") }}`, the base branch is the repository default branch, and the published body preserves the main content and issue references from the generated draft. If verification cannot be completed or reveals a mismatch, stop as blocked.
        10. Record the manual verification verdict, archive path, spec sync status, chosen commit SHA, PR title, PR URL, and PR verification result in `delivery-closeout.md`.
    output_contracts:
      report:
        - name: delivery-closeout.md
          format:
            file: ../facets/output-contracts/delivery-closeout.md
    rules:
      - condition: User reported issues during manual verification
        next: implement
      - condition: Delivery finalized and closeout report recorded
        next: COMPLETE
      - condition: Could not finalize delivery safely
        next: ABORT
