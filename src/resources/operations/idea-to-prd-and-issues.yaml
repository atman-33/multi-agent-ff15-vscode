name: idea-to-prd-and-issues
description: >
  Idea-to-PRD GitHub planning operation.
  Noctis clarifies the request, drafts a PRD, creates or updates a parent GitHub issue, gets User approval, and then expands the approved PRD into child issues.
initial_step: clarify-requirements

steps:
  - name: clarify-requirements
    agent: noctis
    instruction:
      inline: |
        # Clarify Requirements

        ## Role: Planner

        Convert User's request into a concrete plan that downstream agents can execute.

        Responsibilities:
        - Organize the goal, success conditions, constraints, and scope
        - Review related code and existing patterns to identify the impact surface
        - Ask User only about unresolved points that must be clarified before implementation
        - Stop at the plan and decision material; do not move into implementation

        Principles:
        1. **Plan Before Code**: Do not implement. Firm up the plan first.
        2. **Ask Only When Needed**: Ask specific questions only when missing information is a blocker.
        3. **Ground in Codebase**: Base the plan on actual investigation of the codebase.
        4. **Be Actionable**: Make the result concrete enough that the implementer can start immediately.

        Do not:
        - Start implementation, prototyping, or code changes
        - Fill gaps by guessing about unverified details
        - Add out-of-scope proposals on your own

        ## Instructions

        1. Investigate the codebase first. If a question can be answered from the existing code, docs, tests, or surrounding patterns, answer it yourself instead of asking User.
        2. When clarification is still needed, ask one focused question at a time. Walk down each unresolved branch of the design tree until the PRD scope, success criteria, constraints, issue structure, and requested language are stable enough to draft the PRD.
        3. For each important unresolved choice, provide your recommended answer or the default you would use if User does not override it. Keep the conversation moving toward a publishable plan.
        4. Keep questions limited to what is necessary to finalize the specification. Avoid reopening decisions that are already settled or asking for information that downstream investigation can resolve.
        5. The artifact produced in this step becomes fixed input for downstream steps. At a minimum, record the following in `requirements-brief.md`, and write its body in the language specified by User or in `{{ setting("language", "name") }}` if none is specified.
           - `PRD Key`: a stable kebab-case key that uniquely identifies this request. Embed the same key in downstream GitHub issue bodies and use it to decide create versus update on reruns.
           - Problem, success criteria, constraints, in-scope items, and out-of-scope items.
           - The language explicitly requested by User. If none is specified, default to `{{ setting("language", "name") }}`.
        6. Once the specification is solid enough that the next step can draft the PRD without more interviews, output the artifact. End as cancelled only if User wants to stop at this stage.
    output_contracts:
      report:
        - name: requirements-brief.md
          format:
            file: ../facets/output-contracts/requirements-brief.md
    rules:
      - condition: Requirements clarified and brief recorded
        next: draft-prd
      - condition: User cancelled before drafting
        next: cancelled

  - name: draft-prd
    agent: noctis
    instruction:
      inline: |
        # Draft PRD

        ## Role: Planner

        Convert User's request into a concrete plan that downstream agents can execute.

        Responsibilities:
        - Organize the goal, success conditions, constraints, and scope
        - Review related code and existing patterns to identify the impact surface
        - Ask User only about unresolved points that must be clarified before implementation
        - Stop at the plan and decision material; do not move into implementation

        Principles:
        1. **Plan Before Code**: Do not implement. Firm up the plan first.
        2. **Ask Only When Needed**: Ask specific questions only when missing information is a blocker.
        3. **Ground in Codebase**: Base the plan on actual investigation of the codebase.
        4. **Be Actionable**: Make the result concrete enough that the implementer can start immediately.

        Do not:
        - Start implementation, prototyping, or code changes
        - Fill gaps by guessing about unverified details
        - Add out-of-scope proposals on your own

        ## Instructions

        1. Read `{{ output("clarify-requirements", "latest", "requirements-brief.md") }}` and treat all settled points there as the source of truth without asking again.
        2. In this step, draft `prd-draft.md` only; do not publish or update the GitHub issue yet.
        3. Explore the repository enough to verify the current state of the codebase and to pressure-test the proposed solution. If critical design branches are still unresolved, ask focused follow-up questions one at a time before finalizing the draft.
        4. Sketch the major modules, interfaces, or system boundaries that will need to be built or modified. Look for opportunities to deepen shallow modules and to hide complexity behind stable public interfaces. If key module or testing-target assumptions remain uncertain, call them out explicitly before moving on.
        5. Write the body of `prd-draft.md`, along with the GitHub issue title and body it contains, in the language specified by User, or in `{{ setting("language", "name") }}` if no explicit language was requested.
        6. Include both the GitHub issue title and a complete GitHub issue body in `prd-draft.md`. The issue body must contain these sections in order: `Problem Statement`, `Solution`, `User Stories`, `Implementation Decisions`, `Testing Decisions`, `Out of Scope`, and `Further Notes`.
        7. At the start of `## GitHub Issue Body`, include the HTML comment `<!-- prd-key: <same PRD Key> -->` so downstream steps can identify an existing parent issue again.
        8. Make the `User Stories` list extensive enough to cover the important user-visible and operational aspects of the feature. Keep implementation and testing decisions concrete enough to guide downstream work, but do not include specific file paths or code snippets.
    output_contracts:
      report:
        - name: prd-draft.md
          format:
            file: ../facets/output-contracts/prd-draft.md
    rules:
      - condition: PRD draft prepared
        next: publish-parent-issue
      - condition: Cannot draft a coherent PRD
        next: ABORT

  - name: publish-parent-issue
    agent: noctis
    instruction:
      inline: |
        # Publish Parent Issue

        ## Role: Planner

        Convert User's request into a concrete plan that downstream agents can execute. Stop at the plan and decision material; do not move into implementation.

        ## Instructions

        1. Read `{{ output("clarify-requirements", "latest", "requirements-brief.md") }}` and `{{ output("draft-prd", "latest", "prd-draft.md") }}`.
        2. Treat the GitHub issue title and body included in `prd-draft.md` as the source of truth for the parent PRD issue.
        3. Using `PRD Key`, search open issues for one that contains `<!-- prd-key: <PRD Key> -->`. If exactly one is found, update it; if none is found, create it. If multiple are found, treat the step as blocked for safety.
        4. Whether creating or updating, leave the final GitHub issue title and body matching `prd-draft.md`.
        5. Write the body of `parent-prd-issue.md` in the language specified by User, or in `{{ setting("language", "name") }}` if no explicit language was requested.
        6. After completion, record `prd_key`, `issue_number`, `issue_url`, `issue_title`, and `issue_action` in `parent-prd-issue.md`.
        7. If creating or updating the GitHub issue fails, stop and state the reason together with the recommended next action.
    output_contracts:
      report:
        - name: parent-prd-issue.md
          format:
            file: ../facets/output-contracts/parent-prd-issue.md
    rules:
      - condition: Parent PRD issue created or updated
        next: approve-parent-prd
      - condition: Could not safely publish the parent issue
        next: ABORT

  - name: approve-parent-prd
    agent: noctis
    instruction:
      inline: |
        # Approve Parent PRD

        ## Role: Planner

        Convert User's request into a concrete plan that downstream agents can execute. Stop at the plan and decision material; do not move into implementation.

        ## Instructions

        1. Read `{{ output("draft-prd", "latest", "prd-draft.md") }}` and `{{ output("publish-parent-issue", "latest", "parent-prd-issue.md") }}`.
        2. Show User the key points of the PRD draft together with the parent issue URL and explicitly confirm that both the content and the issue result look correct.
        3. If User requests changes, summarize the requested revisions so the next `draft-prd` step can incorporate them.
        4. Move to child issue expansion only when User explicitly approves.
        5. If User wants to stop here, proceed to abort.
    rules:
      - condition: User approved the parent PRD issue
        next: expand-to-child-issues
      - condition: User requested PRD or issue revisions
        next: draft-prd
      - condition: User cancelled after review
        next: ABORT

  - name: expand-to-child-issues
    agent: noctis
    instruction:
      inline: |
        # Expand To Child Issues

        ## Role: Planner

        Convert User's request into a concrete plan that downstream agents can execute.

        Responsibilities:
        - Organize the goal, success conditions, constraints, and scope
        - Review related code and existing patterns to identify the impact surface
        - Ask User only about unresolved points that must be clarified before implementation
        - Stop at the plan and decision material; do not move into implementation

        Principles:
        1. **Plan Before Code**: Do not implement. Firm up the plan first.
        2. **Ask Only When Needed**: Ask specific questions only when missing information is a blocker.
        3. **Ground in Codebase**: Base the plan on actual investigation of the codebase.
        4. **Be Actionable**: Make the result concrete enough that the implementer can start immediately.

        Do not:
        - Start implementation, prototyping, or code changes
        - Fill gaps by guessing about unverified details
        - Add out-of-scope proposals on your own

        ## Instructions

        1. Read `{{ output("draft-prd", "latest", "prd-draft.md") }}` and `{{ output("publish-parent-issue", "latest", "parent-prd-issue.md") }}`.
        2. Use `issue_number` from `parent-prd-issue.md` as the parent issue. Do not ask User for the parent PRD issue number again.
        3. If additional codebase exploration is needed to size the work correctly, do that before proposing the breakdown.
        4. Break the PRD into tracer-bullet vertical slices. Each slice must deliver a narrow but complete path through the relevant integration layers, be demoable or verifiable on its own, and stay small enough for one focused implementation pass. Prefer many thin slices over a few thick ones.
        5. Mark each slice as `HITL` or `AFK`. Prefer `AFK` where possible, and make dependencies explicit instead of burying them inside a broad catch-all issue.
        6. Present the proposed breakdown to User as a numbered list. For each slice, show `Title`, `Type`, `Blocked by`, and `User stories covered`. Confirm the granularity, dependency structure, and HITL versus AFK classification with User, and iterate until the breakdown is approved.
        7. After approval, create the child issues in dependency order. In each issue body, reference the parent issue and relevant user stories correctly, keep the content consistent with the PRD, and include these sections: `Parent PRD`, `What to build`, `Acceptance criteria`, `Blocked by`, and `User stories addressed`.
        8. In addition to issue body text, set the parent relationship on GitHub, and set blocked-by relationships for issues that have dependencies.
        9. Write the child issue proposals, the created child issue titles and bodies, and the body of `child-issues.md` in the language specified by User, or in `{{ setting("language", "name") }}` if no explicit language was requested. After completion, summarize the created issues, their dependencies, the parent issue number, the main covered user stories, and the actual parent / blocked by relationships that were set.
    output_contracts:
      report:
        - name: child-issues.md
          format:
            file: ../facets/output-contracts/child-issues.md
    rules:
      - condition: Child issues created and summarized
        next: COMPLETE
      - condition: Could not finalize child issues
        next: ABORT

  - name: cancelled
    agent: noctis
    instruction:
      inline: |
        # Cancelled

        ## Role: Planner

        You were converting User's request into a concrete plan, but User chose to stop before PRD drafting.

        ## Instructions

        1. End this workflow because User chose to stop before PRD drafting.
        2. If there is a cancellation reason, summarize it briefly and add a short note about any prerequisite needed to resume later.
    rules:
      - condition: Cancellation acknowledged
        next: ABORT
