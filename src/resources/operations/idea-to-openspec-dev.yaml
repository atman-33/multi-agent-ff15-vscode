name: idea-to-openspec-dev
description: >
  Idea-driven OpenSpec delivery operation.
  Noctis clarifies the request, creates OpenSpec change artifacts, Gladiolus implements with TDD, Ignis reviews, Prompto prepares manual verification docs, and Noctis closes out delivery after User verification.
initial_step: clarify-requirements

steps:
  - name: clarify-requirements
    agent: noctis
    job:
      file: ../facets/jobs/planner.md
    instruction:
      file: ../facets/instructions/idea-openspec-clarify-requirements.md
    output_contracts:
      report:
        - name: change-brief.md
          format:
            file: ../facets/output-contracts/change-brief.md
    rules:
      - condition: Requirements clarified and brief recorded
        next: spec-planning
      - condition: User cancelled before planning
        next: cancelled

  - name: spec-planning
    agent: noctis
    job:
      file: ../facets/jobs/planner.md
    instruction:
      file: ../facets/instructions/openspec-idea-spec-planning.md
    skills:
      - file: ../facets/skills/agent-relationships/SKILL.md
    output_contracts:
      report:
        - name: spec-plan.md
          format:
            file: ../facets/output-contracts/spec-plan.md
    rules:
      - condition: OpenSpec artifacts generated, and approval was obtained only if User explicitly requested artifact review before implementation
        next: implement
      - condition: Cannot proceed with planning safely
        next: ABORT

  - name: implement
    agent: gladiolus
    job:
      file: ../facets/jobs/implementer.md
    instruction:
      file: ../facets/instructions/openspec-implement-with-tdd.md
    policies:
      - file: ../facets/policies/coding-standards.md
    rules:
      - condition: Implementation complete and relevant tests pass
        next: review
      - condition: Cannot proceed with implementation
        next: ABORT

  - name: review
    agent: ignis
    job:
      file: ../facets/jobs/reviewer.md
    instruction:
      file: ../facets/instructions/openspec-review-against-change.md
    policies:
      - file: ../facets/policies/coding-standards.md
    output_contracts:
      report:
        - name: code-review.md
          format:
            file: ../facets/output-contracts/code-review.md
    rules:
      - condition: Approved — no blocking issues
        next: manual-verification
      - condition: Blocking or critical issues found
        next: implement
      - condition: Review cannot proceed
        next: ABORT

  - name: manual-verification
    agent: prompto
    job:
      file: ../facets/jobs/verification-writer.md
    instruction:
      file: ../facets/instructions/openspec-manual-verification.md
    output_contracts:
      report:
        - name: manual-verification.md
          format:
            file: ../facets/output-contracts/manual-verification.md
    rules:
      - condition: Manual verification document created
        next: finalize-delivery
      - condition: Cannot create the document
        next: ABORT

  - name: finalize-delivery
    agent: noctis
    job:
      file: ../facets/jobs/noctis-autonomous.md
    instruction:
      file: ../facets/instructions/openspec-finalize-delivery.md
    output_contracts:
      report:
        - name: delivery-closeout.md
          format:
            file: ../facets/output-contracts/delivery-closeout.md
    rules:
      - condition: User reported issues during manual verification
        next: implement
      - condition: Delivery finalized and closeout report recorded
        next: COMPLETE
      - condition: Could not finalize delivery safely
        next: ABORT

  - name: cancelled
    agent: noctis
    job:
      file: ../facets/jobs/planner.md
    instruction:
      inline: |
        # Cancelled — Instructions

        1. User wanted to stop before OpenSpec artifact creation, so end this workflow.
        2. If a reason for cancellation was given, summarize it briefly and mention any prerequisite for resuming.
    rules:
      - condition: Cancellation acknowledged
        next: ABORT
